name: first_workflow
on: workflow_dispatch
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Greeting
        run: |
          echo "Hello, World!"
          echo "Welcome to my first GitHub Actions workflow."
      - name: Print Current Date
        run: date
      - name: Print Goodbye Message
        run: echo "Goodbye, World!"